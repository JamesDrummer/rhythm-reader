<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F5F5F5" />
    <meta
      name="description"
      content="Rhythm Reader helps BHDA students practise reading drum rhythms accurately."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Rhythm Reader</title>
    <script>
      ;(() => {
        const key = 'rhythm-reader:theme'
        let preference = 'system'

        try {
          const stored = localStorage.getItem(key)
          if (stored === 'light' || stored === 'dark' || stored === 'system') {
            preference = stored
          }
        } catch {
          // Use the device setting when browser storage is unavailable.
        }

        const systemDark = window.matchMedia?.(
          '(prefers-color-scheme: dark)',
        ).matches
        const theme =
          preference === 'system' ? (systemDark ? 'dark' : 'light') : preference

        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute('content', theme === 'dark' ? '#171717' : '#F5F5F5')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
